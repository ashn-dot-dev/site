<script src="/mellifera/wasm/wasm_exec.js"></script>
<script src="/mellifera/mellifera.js"></script>

<br> <!-- a little bit of extra space beween the nav and program textarea -->

<textarea class="mellifera" wrap="off" rows="20" id="program" placeholder="Enter your Mellifera program here...">
println("hello 🐝");

let x = ["foo", {"bar": 123}, "baz"];
let y = x; # x is assigned to y by copy
println($`x is {x}`);
println($`y is {y}`);

# updates to x and y do not affect each other, because they are separate values
x[0] = "abc";
y[1]["bar"] = "xyz";
println($`x is now {x}`);
println($`y is now {y}`);

# Find more examples in the Mellifera project repository:
# https://github.com/ashn-dot-dev/mellifera
</textarea>
<button class="mellifera" onClick='mellifera.eval(document.getElementById("program").value, {stdout: "output", stderr: "output"});'>Run</button>
<textarea class="mellifera" wrap="off" rows="12" id="output" placeholder="Output..." readonly></textarea>
